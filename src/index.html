<!--
 * index.html
 * Εργαστήριο Λατομείων Γαλάτιστας
 * ─────────────────────────────────────────────────────────────
 * Έκδοση : 0.99.3
 * Ημ/νία  : 2026-06-02
 -->
<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Εργαστήριο Λατομείων Γαλάτιστας</title>
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/reports-print.css">
</head>
<body>

  <!-- Splash overlay — εμφανίζεται ώσπου ο Python backend να είναι έτοιμος -->
  <div id="splash-overlay">
    <img src="assets/logo.png" alt="Λατομεία Γαλάτιστας" id="splash-logo">
    <div id="splash-title">Εργαστήριο Λατομείων Γαλάτιστας</div>
    <div id="splash-spinner"></div>
    <div id="splash-msg">Εκκίνηση συστήματος…</div>
  </div>

  <!-- ================================================
       CUSTOM TITLEBAR — frameless window (χωρίς native title bar/menu)
       ================================================ -->
  <div id="titlebar">
    <div id="titlebar-drag">
      <img src="assets/logo.png" id="titlebar-logo" alt="">
      <span id="titlebar-title">Εργαστήριο Λατομείων Γαλάτιστας</span>
    </div>
    <div id="titlebar-controls">
      <button id="titlebar-min" class="titlebar-btn" title="Ελαχιστοποίηση">─</button>
      <button id="titlebar-max" class="titlebar-btn" title="Μεγιστοποίηση">▢</button>
      <button id="titlebar-close" class="titlebar-btn titlebar-btn-close" title="Κλείσιμο">✕</button>
    </div>
  </div>

  <div id="app">

    <!-- ================================================
         SIDEBAR — Κλειδωμένο, δεν αλλάζει ποτέ
         ================================================ -->
    <nav id="sidebar">
      <div class="sidebar-header">
        <img src="assets/logo.png" class="logo-img" alt="Λατομεία Γαλάτιστας">
      </div>

      <ul class="nav-menu">
        <li class="nav-item active" data-page="dashboard">
          <span class="nav-icon">⬛</span>
          <span class="nav-label">Αρχική</span>
        </li>
        <li class="nav-item" data-page="samples">
          <span class="nav-icon">✎</span>
          <span class="nav-label">Καταχώρηση</span>
        </li>
        <li class="nav-item" data-page="history">
          <span class="nav-icon">≡</span>
          <span class="nav-label">Ιστορικό</span>
        </li>
        <li class="nav-item" data-page="reports">
          <span class="nav-icon">▤</span>
          <span class="nav-label">Εκθέσεις</span>
        </li>
        <li class="nav-item" data-page="library">
          <span class="nav-icon">📚</span>
          <span class="nav-label">Βιβλιοθήκη</span>
          <span id="library-badge" style="display:none;background:#b45309;color:#fff;
                border-radius:10px;font-size:10px;padding:1px 6px;margin-left:auto;">!</span>
        </li>
        <li class="nav-item" data-page="settings">
          <span class="nav-icon">⚙</span>
          <span class="nav-label">Ρυθμίσεις</span>
        </li>
      </ul>

      <!-- Archive Mode Banner -->
      <div id="sidebar-archive-banner" style="display:none;
           background:#b45309;color:#fff;padding:8px 10px;
           border-radius:6px;margin:0 8px 8px;font-size:12px;">
        <div style="font-weight:700;letter-spacing:.5px;margin-bottom:2px;">
          🗄 ARCHIVE MODE
        </div>
        <div id="archive-banner-ce" style="font-size:11px;opacity:.9;margin-bottom:6px;"></div>
        <button onclick="App.exitArchiveMode()"
                style="width:100%;padding:4px;border:1px solid rgba(255,255,255,.5);
                       border-radius:4px;background:rgba(255,255,255,.15);
                       color:#fff;font-size:11px;cursor:pointer;">
          ↩ Επιστροφή στην τρέχουσα
        </button>
      </div>

      <div class="sidebar-footer">
        <div class="ce-badge">
          <span class="ce-mark">CE</span>
          <span class="ce-info" id="sidebar-ce-number">1128-CPR-0196</span>
        </div>
        <div class="ce-expiry" id="sidebar-ce-expiry"></div>
        <div id="sidebar-ce-warn" style="display:none;"></div>
        <div id="sidebar-version" style="font-size:0.72em;color:var(--text-muted);margin-top:6px;opacity:0.6;"></div>
      </div>
    </nav>

    <!-- ================================================
         CONTENT AREA — Φορτώνει δυναμικά κάθε σελίδα
         ================================================ -->
    <main id="content">
      <div id="page-container"></div>
    </main>

  </div>

  <!-- Global Modal -->
  <div id="modal-overlay" class="hidden">
    <div id="modal">
      <div id="modal-header">
        <div id="modal-title"></div>
        <button id="modal-close" onclick="App.closeModal()">✕</button>
      </div>
      <div id="modal-body">
        <div id="modal-content"></div>
      </div>
      <div id="modal-actions"></div>
    </div>
  </div>

  <!-- Global Toasts -->
  <div id="toast-container"></div>

  <script type="module" src="main-app.js"></script>
</body>
</html>

<div class="page-header">
  <div>
    <h1 class="page-title">Βιβλιοθήκη Εγγράφων</h1>
    <p class="page-subtitle">Διαχείριση εγγράφων, προδιαγραφών και πιστοποιητικών.</p>
  </div>
</div>

<div id="library-standards-alert" style="display:none;
     background:rgba(180,83,9,.1);border:1px solid rgba(180,83,9,.4);
     border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:13px;">
  ⚠ <span id="library-standards-msg"></span>
</div>

<div style="display:flex;gap:16px;height:calc(100vh - 180px);">

  <!-- ── Ενότητες ───────────────────────────────────────── -->
  <div style="width:220px;flex-shrink:0;display:flex;flex-direction:column;gap:4px;">
    <div id="section-list" style="flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:2px;"></div>
    <button class="btn-secondary" style="margin-top:8px;width:100%;"
            onclick="LibraryPage.showAddSection()">+ Νέα Ενότητα</button>
  </div>

  <!-- ── Έγγραφα ────────────────────────────────────────── -->
  <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <h2 id="section-title" style="font-size:15px;font-weight:600;margin:0;">—</h2>
      <button class="btn-primary btn-sm" onclick="LibraryPage.showAddDocument()">
        + Προσθήκη Εγγράφου
      </button>
    </div>
    <div id="document-list" style="flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px;">
      <div style="color:var(--text-muted);font-size:13px;">Επιλέξτε ενότητα</div>
    </div>
  </div>

</div>

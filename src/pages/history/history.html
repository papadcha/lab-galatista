<!--
  ──────────────────────────────────────────────────────────────
  ΣΕΛΙΔΑ: Ιστορικό (history.html)
  ──────────────────────────────────────────────────────────────
  Αναζήτηση δειγμάτων με φίλτρα.
  Click σε δείγμα → μετάβαση στη σελίδα Δοκιμές.
  ──────────────────────────────────────────────────────────────
-->

<div class="page">

  <div class="page-header">
    <h1>Ιστορικό Δειγμάτων</h1>
    <p class="page-subtitle">
      Αναζήτηση και πρόσβαση σε δείγματα. Κάντε κλικ σε δείγμα
      για να ανοίξετε τις δοκιμές του.
    </p>
  </div>

  <!-- Φίλτρα -->
  <div class="form-card" style="padding:14px 18px;">
    <style>
  #h-from::placeholder, #h-to::placeholder { color: var(--text); opacity: 0.9; font-size: 12px; }
  #h-from, #h-to { font-family: 'IBM Plex Mono', monospace; }
  #new-date::placeholder { color: var(--text); opacity: 0.9; }
  #new-date { font-family: 'IBM Plex Mono', monospace; }
</style>
<div class="filter-bar">

      <div class="filter-group">
        <label>Κωδικός</label>
        <input type="text" id="h-code" placeholder="πχ ΓΑΛ-2026..."
               onkeydown="if(event.key==='Enter') HistoryPage.search()">
      </div>

      <div class="filter-group">
        <label>Προϊόν</label>
        <select id="h-product">
          <option value="">Όλα τα προϊόντα</option>
        </select>
      </div>

      <div class="filter-group">
        <label>Κατηγορία</label>
        <select id="h-category">
          <option value="">Όλες</option>
          <option value="ΛΕΠΤΟΚΟΚΚΟ">Λεπτόκοκκο</option>
          <option value="ΧΟΝΔΡΟΚΟΚΚΟ">Χονδρόκοκκο</option>
          <option value="ALL_IN">All-in</option>
        </select>
      </div>

      <div class="filter-group">
        <label>Από</label>
        <input type="text" id="h-from" placeholder="ηη/μμ/εεεε" title="Μορφή: ημέρα/μήνας/έτος πχ 23/05/2026" maxlength="10" style="width:110px;letter-spacing:1px;" oninput="this.value=this.value.replace(/[^0-9\/]/g,'')">
      </div>

      <div class="filter-group">
        <label>Έως</label>
        <input type="text" id="h-to" placeholder="ηη/μμ/εεεε" title="Μορφή: ημέρα/μήνας/έτος πχ 23/05/2026" maxlength="10" style="width:110px;letter-spacing:1px;" oninput="this.value=this.value.replace(/[^0-9\/]/g,'')">
      </div>

      <div class="filter-group filter-group-status">
        <label>Κατάσταση</label>
        <select id="h-status">
          <option value="">Όλα</option>
          <option value="pending">Εκκρεμή</option>
          <option value="complete">Ολοκληρωμένα</option>
        </select>
      </div>

      <button class="btn-primary" onclick="HistoryPage.search()">
        🔍 Αναζήτηση
      </button>
      <button class="btn-secondary" onclick="HistoryPage.reset()">
        ✕ Καθαρισμός
      </button>

    </div>
  </div>

  <!-- Αποτελέσματα -->
  <div class="table-card" id="h-results-card" style="margin-top:12px;">
    <div class="table-header">
      <span id="h-result-count" class="table-count"></span>
    </div>
    <table class="data-table full-width">
      <thead>
        <tr>
          <th>Κωδικός</th>
          <th>Ημερομηνία</th>
          <th>Προϊόν</th>
          <th>Κατηγορία</th>
          <th>Δοκιμές</th>
          <th>Κατάσταση</th>
        </tr>
      </thead>
      <tbody id="h-results">
        <tr>
          <td colspan="6" class="empty-msg">
            Χρησιμοποιήστε τα φίλτρα για αναζήτηση
          </td>
        </tr>
      </tbody>
    </table>
  </div>

</div>

<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 0;
  background: #fff;
  color: #2c2c2a;
}
.guide-header {
  position: sticky;
  top: 0;
  background: #fff;
  border-bottom: 0.5px solid #e5e3dc;
  padding: 14px 20px 12px;
  z-index: 10;
}
.label  { font-size:11px; color:#888; text-transform:uppercase; letter-spacing:0.5px; margin:0; }
.title  { font-size:17px; font-weight:500; margin:4px 0 0; }
.guide-body { padding: 0 20px 30px; }
.sel-row { display:flex; align-items:center; gap:12px; margin: 14px 0;
            padding:10px 12px; background:#f5f5f3; border-radius:8px;
            border:0.5px solid #ddd; flex-wrap:wrap; }
.sel-row label { font-size:13px; color:#666; }
.sel-row select { font-size:13px; border:0.5px solid #ccc; border-radius:6px; padding:4px 8px; }
.qty-badge { font-size:12px; font-weight:500; color:#0c447c; background:#e6f1fb;
              padding:3px 8px; border-radius:6px; }
.group-title {
  font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px;
  color:#888; margin: 22px 0 8px; padding-bottom: 6px;
  border-bottom: 0.5px solid #e5e3dc;
}
.steps { display:flex; flex-direction:column; }
.step  { display:flex; gap:14px; padding:13px 0; border-bottom:0.5px solid #eee; }
.step:last-child { border-bottom:none; }
.num   { flex-shrink:0; width:26px; height:26px; border-radius:50%; background:#f5f5f3;
          border:0.5px solid #ccc; display:flex; align-items:center; justify-content:center;
          font-size:12px; font-weight:500; color:#666; }
.ttl   { font-size:14px; font-weight:500; margin:0 0 3px; }
.dsc   { font-size:13px; color:#666; margin:0; line-height:1.5; }
.qty   { display:inline-block; margin-top:5px; font-size:12px; font-weight:500;
          color:#0c447c; background:#e6f1fb; padding:3px 8px; border-radius:6px; }
.note  { display:inline-block; margin-top:5px; font-size:12px;
          color:#854f0b; background:#faeeda; padding:3px 8px; border-radius:6px; }
.fml   { font-family:monospace; font-size:12px; background:#f5f5f3;
          border:0.5px solid #ddd; border-radius:6px; padding:3px 8px;
          display:inline-block; margin-top:5px; }
.svg-wrap { margin-top:12px; border:0.5px solid #e5e3dc; border-radius:8px;
             background:#faf9f7; padding:12px; text-align:center; }
.svg-wrap svg { max-width:100%; height:auto; }
.footer {
  position: sticky;
  bottom: 0;
  background: #fff;
  border-top: 0.5px solid #e5e3dc;
  padding: 14px 20px;
  text-align: right;
}
.btn-primary {
  font-size:14px; font-weight:500; padding:9px 20px;
  background:#2c2c2a; color:#fff; border:none;
  border-radius:8px; cursor:pointer;
}
.btn-primary:hover { background:#444; }
</style>
</head>
<body>
<div class="guide-header">
  <p class="label">EN 933-8</p>
  <p class="title">Ισοδύναμο άμμου</p>
</div>

<div class="guide-body">
  <div class="sel-row">
    <label>d<sub>max</sub> αδρανούς:</label>
    <select id="dmax-sel">
      <option value="2">2 mm</option>
      <option value="4" selected>4 mm</option>
      <option value="5.6">5.6 mm</option>
      <option value="8">8 mm</option>
      <option value="11.2">11.2 mm</option>
      <option value="16">16 mm</option>
      <option value="22.4">22.4 mm</option>
      <option value="31.5">31.5 mm</option>
    </select>
    <span class="qty-badge" id="qty-badge"></span>
  </div>

  <div id="sc"></div>
</div>

<div class="footer">
  <button class="btn-primary" id="btn-done">Καταχώρηση αποτελεσμάτων →</button>
</div>
<script>
const MIN_SAMPLE = [[4,0.2],[8,0.6],[16,2.6],[32,10],[63,40]];

function getMinSample(d) {
  for (const [k,v] of MIN_SAMPLE) { if (d <= k) return v; }
  return 35;
}

function el(id) { return document.getElementById(id); }

  <circle cx="305" cy="307" r="2" fill="#888780"/>

  <text class="th" x="340" y="539" text-anchor="middle">SE = (h&#x2082; / h&#x2081;) &#215; 100</text>
</svg>`;

const GROUPS = [
  {
    label: 'Προετοιμασία δείγματος',
    steps: q => [
      {
        ttl: 'Λήψη δείγματος',
        dsc: 'Υλικό που περιέχει κλάσμα 0/2mm. Κοσκίνισμα στο 2mm: ξηρό (υγρασία <2%) ή υγρό.',
        qty: `Ελάχ. αρχικό δείγμα: ${q.minSample} kg  (EN 932-1 πίνακας)`,
      },
      {
        ttl: 'Μείωση δείγματος (EN 932-2)',
        dsc: 'Μείωση σε 2 υποδείγματα ίσης μάζας.',
        qty: `Υποδείγμα 2: δεν ξηραίνεται`,
      },
      {
        ttl: 'Υποδείγμα 1 — w και f',
        dsc: 'Μείωση σε 2 δοκίμια. Α: ξήρανση 110±5°C → w%. Β: ζύγιση M₁, πλύση 0.063mm, ξήρανση, ζύγιση M₂.',
        fml: 'f = 100 − M₂(100+w) / M₁  (%)',
        note: q.dmax > 4 ? `d_max=${q.dmax}mm: βεβαιωθείτε ότι κλάσμα <2mm ≥ 2×MT+υλικό για w,f` : null,
      },
      {
        ttl: 'Υποδείγμα 2 — υπολογισμός MT',
        dsc: 'Μείωση σε 2 δοκίμια (τα δοκίμια της δοκιμής). Αν f ≤10%:',
        fml: 'MT = 120 × (100 + w) / 100  (g)',
        qty: 'Για w≈0%: MT≈120g · w≈5%: MT≈126g · w≈10%: MT≈132g',
        note: 'Αν f >10%: MT = M₃ + M₄ (§7.3)',
      },
    ],
  },
  {
    label: 'Πλήρωση κυλίνδρων',
    steps: q => [
      {
        ttl: 'Διάλυμα CaCl₂',
        dsc: 'Αραίωση 125±1 ml πυκνού διαλύματος σε 5L απιονισμένο νερό. Μέγιστη ηλικία 28 ημέρες.',
        note: 'Θερμοκρασία εργαστηρίου: 23±3°C',
      },
      {
        ttl: 'Πλήρωση με διάλυμα',
        dsc: 'Σιφώνιο διάλυμα σε κάθε κύλινδρο μέχρι 1η χαραγή (100mm από βάση).',
      },
      {
        ttl: 'Εισαγωγή δοκιμίου',
        dsc: 'Με χωνί μεταφορά MT δείγματος. Χτύπημα βάσης για απελευθέρωση αέρα.',
        qty: '2 κύλινδροι παράλληλα (2 × MT)',
      },
      {
        ttl: 'Εμβάπτιση 10±1 min',
        dsc: 'Αφήνουμε αδιατάρακτο για διαβροχή του δοκιμίου.',
      },
    ],
  },
  {
    label: 'Ανακίνηση & έκπλυση',
    steps: q => [
      {
        ttl: 'Ανακίνηση 30±1 sec',
        dsc: 'Πώμα στον κύλινδρο. Μηχανικός αναδευτήρας: 90±3 κύκλοι. Επανάληψη για 2ο κύλινδρο.',
      },
      {
        ttl: 'Έκπλυση',
        dsc: 'Αφαίρεση πώματος. Σωλήνας έκπλυσης μέχρι βάση με απαλές περιστροφικές κινήσεις. Άνοδος μέχρι 380mm.',
      },
      {
        ttl: 'Αφαίρεση σωλήνα & έναρξη χρονομέτρησης',
        dsc: 'Αργή αφαίρεση χωρίς διακοπή ροής. Ρύθμιση ακριβώς στα 380mm. Έναρξη χρονομέτρησης αμέσως.',
      },
    ],
  },
  {
    label: 'Ηρεμία & μετρήσεις',
    steps: q => [
      {
        ttl: 'Ηρεμία 20±0.25 min',
        dsc: 'Χωρίς δόνηση ή διατάραξη. Αν h₁ δεν διαβάζεται → +10 min. Αν πάλι όχι → επανάληψη δοκιμής.',
      },
      {
        ttl: 'Μέτρηση h₁',
        dsc: 'Κανόνας 500mm: ύψος από βάση κυλίνδρου έως επιφάνεια αιώρησης (πάνω όριο θολού υγρού). Στο πλησιέστερο mm.',

      },
      {
        ttl: 'Μέτρηση h₂',
        dsc: 'Κατέβασμα εμβόλου μέχρι επαφή με ίζημα. Κολάρο στο χείλος. Μέτρηση κολάρου–κεφαλής με κανόνα στη σχισμή.',
      },
    ],
  },
  {
    label: 'Αποτέλεσμα',

        ttl: 'SE ανά κύλινδρο',
        dsc: 'Υπολογισμός με 1 δεκαδικό:',
        fml: 'SE = (h₂ / h₁) × 100',
      },
      {
        ttl: 'Έλεγχος επαναληψιμότητας',
        dsc: 'Αν |SE₁ − SE₂| > 4 μονάδες → επανάληψη ολόκληρης της δοκιμής.',
        note: 'Διαφορά >4: απόρριψη αποτελεσμάτων',
      },
      {
        ttl: 'Τελικό αποτέλεσμα',
        dsc: 'Μέσος όρος, στρογγυλοποίηση στον κοντινότερο ακέραιο:',
        fml: 'SE = round[(SE₁ + SE₂) / 2]',
      },
    ],
  },
];

function render() {
  const d = parseFloat(el('dmax-sel').value);
  const q = { dmax: d, minSample: getMinSample(d) };
  el('qty-badge').textContent = `EN 933-1 Table 1: ≥${q.minSample} kg δοκίμιο`;

  const sc = el('sc');
  sc.innerHTML = '';
  let stepNum = 1;

  GROUPS.forEach(g => {
    const steps = g.steps(q);
    if (!steps || steps.length === 0) return;

    const groupDiv = document.createElement('div');
    groupDiv.innerHTML = `<div class="group-title">${g.label}</div>`;
    const stepsDiv = document.createElement('div');
    stepsDiv.className = 'steps';

    steps.forEach(s => {
      const d = document.createElement('div');
      d.className = 'step';
      d.innerHTML = `
        <div class="num">${stepNum++}</div>
        <div style="flex:1">
          <p class="ttl">${s.ttl}</p>
          <p class="dsc">${s.dsc}</p>
          ${s.qty  ? `<span class="qty">${s.qty}</span><br>` : ''}
          ${s.fml  ? `<span class="fml">${s.fml}</span><br>` : ''}
          ${s.note ? `<span class="note">${s.note}</span>` : ''}
          ${s.svg  ? `<div class="svg-wrap" id="svg-${s.svg}"></div>` : ''}
        </div>`;
      stepsDiv.appendChild(d);
    });

    groupDiv.appendChild(stepsDiv);
    sc.appendChild(groupDiv);
  });

  // Inject SVGs
  const svgMap = { 'se_cylinder': SE_CYLINDER_SVG };
  document.querySelectorAll('[id^="svg-"]').forEach(el2 => {
    const key = el2.id.replace('svg-','');
    if (svgMap[key]) el2.innerHTML = svgMap[key];
  });
}

el('dmax-sel').onchange = render;
el('btn-done').onclick = function() { window.parent.TestsPage.closeGuidePanel(); };

render();
</script>
</body>
</html>
